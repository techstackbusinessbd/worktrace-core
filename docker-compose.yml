version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: worktrace_app
    restart: unless-stopped
    working_dir: /var/www/html/backend
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
      - redis
    networks:
      - worktrace_network

  webserver:
    image: nginx:alpine
    container_name: worktrace_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - worktrace_network

  db:
    image: postgres:15-alpine
    container_name: worktrace_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-worktrace}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - worktrace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worktrace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worktrace_network

  redis:
    image: redis:alpine
    container_name: worktrace_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - worktrace_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worktrace_network

  minio:
    image: minio/minio
    container_name: worktrace_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8900:8900"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-worktrace}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-worktrace_secret}
    command: server /data --console-address ":8900"
    volumes:
      - worktrace_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - worktrace_network

  frontend:
    image: node:20-alpine
    container_name: worktrace_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - worktrace_network

networks:
  worktrace_network:
    driver: bridge

volumes:
  worktrace_pgdata:
  worktrace_redisdata:
  worktrace_miniodata:
